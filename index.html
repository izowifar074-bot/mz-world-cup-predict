  body{margin:0;background:linear-gradient(180deg,var(--paper) 0%,#fffaf4 100%);color:var(--ink);

  .wrap{max-width:560px;margin:0 auto;padding:42px 24px 38px}
  header{margin-bottom:28px}
  h1{font-size:32px;line-height:1.2;margin:0 0 12px;font-weight:780;letter-spacing:0}
  .sub{color:var(--muted);font-size:15px;max-width:480px}
  .panel{background:var(--card);border:1px solid var(--line);border-radius:8px;padding:22px 22px 20px;
    box-shadow:0 3px 14px rgba(19,35,58,.06)}
  .controls{display:grid;gap:12px;align-items:center}
  select,input,button{font:inherit}
  select,input{width:100%;padding:14px 16px;border:1px solid #d8cfbf;border-radius:8px;background:#fff;color:var(--ink);
    min-height:58px;font-size:17px}
  .model-choice{color:var(--red);font-weight:680;text-align:center;text-align-last:center;background:var(--paper2)}
  .btnrow{display:block;margin-top:14px}
  button.primary,button.secondary{border:0;border-radius:8px;padding:13px 15px;cursor:pointer;font-weight:720;width:100%;font-size:17px}
  button.primary{background:var(--red);color:#fff}
  button.secondary{background:var(--paper2);color:var(--ink);border:1px solid var(--line)}
  button:disabled{opacity:.55;cursor:wait}
  .note{font-size:12px;color:var(--muted);margin-top:9px}
  .result{margin-top:22px}
  .teams{display:grid;grid-template-columns:1fr 34px 1fr;gap:8px;align-items:start;margin:6px 0 14px}
  .team{text-align:center}
  .team .name{font-weight:760;font-size:20px;line-height:1.25}
  .team .elo{font-size:13px;color:var(--muted);margin-top:4px}
  .adv{font-size:42px;font-weight:820;line-height:1.1;margin-top:8px}
  .tag{font-size:13px;color:var(--muted);margin-top:4px}
  .vs{font-size:13px;color:#aa9f8e;padding-top:40px;text-align:center}
  .bar{display:flex;height:10px;border-radius:8px;overflow:hidden;margin:18px 0 8px;background:var(--paper2)}
  .wdl{display:flex;justify-content:space-between;color:var(--muted);font-size:13px;gap:8px}
  .wdl span:nth-child(2){text-align:center}
  .wdl span:last-child{text-align:right}
  .xg{text-align:center;margin:22px 0 18px;color:var(--muted);font-size:15px}
  .xg b{color:var(--ink)}
  .score-title{font-size:13px;color:#a7a094;margin:0 0 10px}
  .chips{display:grid;grid-template-columns:1fr 1fr;gap:9px 10px}
  .chip{font-size:14px;padding:10px 12px;border:1px solid var(--line);border-radius:8px;background:var(--paper2);
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  table{border-collapse:collapse;width:100%;font-size:12px;background:#fff}
  th,td{border:1px solid var(--line);padding:7px 8px;text-align:right;vertical-align:top}
  th{background:var(--ink);color:#fff;font-weight:650}
  td:first-child,th:first-child{text-align:left}
  .status{font-size:13px;color:var(--muted);min-height:22px;margin-top:10px}
  .warn{border-left:4px solid var(--gold);background:#fff8e7;padding:10px 12px;border-radius:8px;color:#5f4b1d;font-size:13px}
  .good{color:var(--good);font-weight:700}.bad{color:var(--red);font-weight:700}
  .mono{font-family:ui-monospace,SFMono-Regular,Consolas,"Liberation Mono",monospace}
  details{margin-top:24px;color:var(--red);font-size:14px}
  summary{cursor:pointer;font-weight:680}
  .explain{color:var(--muted);font-size:12px;margin-top:12px;line-height:1.75}
  footer{margin-top:34px;text-align:center;color:#98a1aa;font-size:12px}
  @media(max-width:420px){
    .wrap{padding:36px 18px 34px}
    h1{font-size:30px}
    .panel{padding:20px 16px 18px}
    .chip{font-size:13px;padding:9px 10px}
    .wdl{font-size:12px}
  }
</style>
</head>

function deepParams(p){return JSON.parse(JSON.stringify(p));}
function clamp(v,lo,hi){return Math.max(lo,Math.min(hi,v));}
function fact(k){let f=1;for(let i=2;i<=k;i++)f*=i;return f;}
function pois(k,l){return Math.exp(-l)*Math.pow(l,k)/fact(k);}
function pc(v,d=0){return (v*100).toFixed(d)+"%";}
function escapeHtml(s){return String(s).replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[m]));}

function norm(s){
  return String(s||"").normalize("NFD").replace(/[\u0300-\u036f]/g,"").toLowerCase().replace(/[^a-z0-9]+/g," ").trim();
}
const alias = new Map([
  ["turkey","Türkiye"],["turkiye","Türkiye"],["ivory coast","Côte D'Ivoire"],["cote d ivoire","Côte D'Ivoire"],
  ["south korea","Korea Republic"],["united states","USA"],["iran","IR Iran"],["cape verde","Cabo Verde"],
  ["czech republic","Czechia"],["bosnia herzegovina","Bosnia And Herzegovina"],["bosnia and herzegovina","Bosnia And Herzegovina"],
  ["curacao","Curaçao"],["saudi arabia","Saudi Arabia"],["new zealand","New Zealand"],["south africa","South Africa"],
  ["dr congo","Congo DR"],["democratic republic of congo","Congo DR"]
]);
function resolveName(name){
  const n=norm(name);
  for(const t of BASE){if(norm(t.t)===n||norm(t.c)===n)return t.t;}
  if(alias.has(n)) return alias.get(n);
  return name;
}

function createStateFromBase(){
  const state={};
  BASE.forEach(t=>state[t.t]={id:t.t,c:t.c,region:t.region||"Unknown",elo:t.e,attack:t.a,defense:t.d,penalty:t.p});
  return state;
}
function createNeutralHistoryState(){
  const state={};
  BASE.forEach(t=>state[t.t]={id:t.t,c:t.c,region:t.region||"Unknown",elo:1500,attack:72,defense:72,penalty:t.p});
  return state;
}
function ensureTeam(state,id){
  id=resolveName(id);
  if(!state[id]) state[id]={id,c:id,region:"Unknown",elo:1500,attack:72,defense:72,penalty:50};
  return state[id];
}
function expectedFromElo(a,b){return 1/(1+Math.pow(10,(b-a)/400));}
function actual(gf,ga){return gf>ga?1:(gf<ga?0:0.5);}
function lambdas(a,b,p,opts={}){
  const hostA=opts.hostA?1:0, hostB=opts.hostB?1:0, neutral=opts.neutral?1:0, importance=opts.importance||0;
  const hostCoef=p.hostCoef||0, neutralCoef=p.neutralCoef||0, importanceCoef=p.importanceCoef||0;
  const logA=p.alpha+p.betaAD*(a.attack-b.defense)+p.betaElo*(a.elo-b.elo)+hostCoef*hostA-hostCoef*hostB+neutralCoef*neutral+importanceCoef*importance;
  const logB=p.alpha+p.betaAD*(b.attack-a.defense)+p.betaElo*(b.elo-a.elo)+hostCoef*hostB-hostCoef*hostA+neutralCoef*neutral+importanceCoef*importance;
  return [clamp(Math.exp(logA),p.minLambda,p.maxLambda),clamp(Math.exp(logB),p.minLambda,p.maxLambda)];
}
function tauDC(i,j,la,lb,rho){
  if(!rho) return 1;
  if(i===0&&j===0) return Math.max(0.001,1-la*lb*rho);
  if(i===0&&j===1) return Math.max(0.001,1+la*rho);
  if(i===1&&j===0) return Math.max(0.001,1+lb*rho);
  if(i===1&&j===1) return Math.max(0.001,1-rho);
  return 1;
}
function scoreMatrix(a,b,p,opts={}){
  const [la,lb]=lambdas(a,b,p,opts);
  let cells=[],sum=0,w=0,d=0,l=0,over15=0,over25=0,over35=0,p00=0,p11=0;
  for(let i=0;i<=p.scoreMax;i++){
    for(let j=0;j<=p.scoreMax;j++){
      let pr=pois(i,la)*pois(j,lb)*tauDC(i,j,la,lb,p.rho||0);
      cells.push({i,j,pr}); sum+=pr;
    }
  }
  cells.forEach(c=>{
    c.pr/=sum;
    if(c.i>c.j) w+=c.pr; else if(c.i===c.j)d+=c.pr; else l+=c.pr;
    if(c.i+c.j>1.5)over15+=c.pr;
    if(c.i+c.j>2.5)over25+=c.pr;
    if(c.i+c.j>3.5)over35+=c.pr;
    if(c.i===0&&c.j===0)p00=c.pr;
    if(c.i===1&&c.j===1)p11=c.pr;
  });
  cells.sort((x,y)=>y.pr-x.pr);
  const penA=1/(1+Math.exp(-(((a.elo-b.elo)/(p.penEloScale||420))+((a.penalty-b.penalty)/(p.penRatingScale||9)))));
  return {la,lb,w,d,l,advA:w+d*penA,penA,over15,over25,over35,p00,p11,cells};
}
function updateState(state,aId,bId,gf,ga,p,opts={}){
  const A=ensureTeam(state,aId), B=ensureTeam(state,bId);
  const pred=scoreMatrix(A,B,p,opts);
  const expA=expectedFromElo(A.elo,B.elo), actA=actual(gf,ga);
  const dE=(p.k||0)*(actA-expA);
  A.elo+=dE; B.elo-=dE;
  const resA=gf-pred.la, resB=ga-pred.lb, k=p.adK||0;
  A.attack+=k*resA; B.defense-=k*resA;
  B.attack+=k*resB; A.defense-=k*resB;
  A.attack=clamp(A.attack,50,105);B.attack=clamp(B.attack,50,105);
  A.defense=clamp(A.defense,50,105);B.defense=clamp(B.defense,50,105);
}
function currentRatings(params){
  const state=createStateFromBase();
  RESULTS.forEach(m=>updateState(state,m.a,m.b,m.gf,m.ga,params,{neutral:true,importance:1}));
  return state;
}
function stateFromSnapshot(params){
  if(!MODEL_SNAPSHOT||!MODEL_SNAPSHOT.ratings) return null;
  const state={};
  Object.entries(MODEL_SNAPSHOT.ratings).forEach(([id,r])=>state[id]={id,c:r.c,region:r.region||"Unknown",elo:r.elo,attack:r.attack,defense:r.defense,penalty:r.penalty});
  RESULTS.filter(m=>m.date>MODEL_SNAPSHOT.latestDate).forEach(m=>updateState(state,m.a,m.b,m.gf,m.ga,params,{neutral:true,importance:1}));
  return state;
}
function historicalCurrentRatings(params, latestDate){
  const state=createNeutralHistoryState();
  if(!historicalMatches) return state;
  for(const m of historicalMatches){
    if(m.date>latestDate) break;
    const cat=classifyTournament(m.tournament);
    updateState(state,m.home,m.away,m.hs,m.as,params,{neutral:m.neutral,importance:importanceOf(cat)});
  }
  return state;
}

function cloneTeam(t){return {...t};}
function daysBetween(a,b){return Math.max(0,(new Date(b)-new Date(a))/86400000);}
function teamHistoryContext(teamId, latestDate){
  if(!historicalMatches) return null;
  const start="2018-01-01", halfLife=730;
  let wSum=0,gf=0,ga=0,pts=0,draw=0,low=0,n=0;
  for(const m of historicalMatches){
    if(m.date<start || m.date>latestDate) continue;
    const home=resolveName(m.home), away=resolveName(m.away);
    if(home!==teamId && away!==teamId) continue;
    const isHome=home===teamId, f=isHome?m.hs:m.as, a=isHome?m.as:m.hs;
    const w=Math.exp(-daysBetween(m.date,latestDate)/halfLife);
    wSum+=w; gf+=w*f; ga+=w*a; pts+=w*(f>a?3:(f===a?1:0)); draw+=w*(f===a?1:0); low+=w*((f+a)<=2?1:0); n++;
  }
  if(!wSum) return {n:0,eloAdj:0,attackAdj:0,defenseAdj:0,drawRate:0.26,lowRate:0.52};
  const gfpg=gf/wSum, gapg=ga/wSum, ppg=pts/wSum, drawRate=draw/wSum, lowRate=low/wSum;
  return {
    n, gfpg, gapg, ppg, drawRate, lowRate,
    eloAdj: clamp(((ppg/3)-0.5)*120,-45,45),
    attackAdj: clamp((gfpg-1.25)*5,-8,8),
    defenseAdj: clamp((1.25-gapg)*5,-8,8)
  };
}
function h2hContext(aId,bId,latestDate){
  if(!historicalMatches) return {n:0,eloAdjA:0,alphaAdj:0};
  let wSum=0,ptsA=0,low=0,n=0;
  for(const m of historicalMatches){
    if(m.date<"2000-01-01" || m.date>latestDate) continue;
    const home=resolveName(m.home), away=resolveName(m.away);
    if(!((home===aId&&away===bId)||(home===bId&&away===aId))) continue;
    const aGoals=home===aId?m.hs:m.as, bGoals=home===aId?m.as:m.hs;
    const w=Math.exp(-daysBetween(m.date,latestDate)/1095);
    wSum+=w; ptsA+=w*(aGoals>bGoals?3:(aGoals===bGoals?1:0)); low+=w*((aGoals+bGoals)<=2?1:0); n++;
  }
  if(!wSum || n<2) return {n,eloAdjA:0,alphaAdj:0};
  const share=ptsA/(3*wSum), lowRate=low/wSum;
  return {
    n,
    eloAdjA: clamp((share-0.5)*18*Math.log1p(n),-18,18),
    alphaAdj: clamp((0.52-lowRate)*0.10,-0.08,0.08),
    lowRate
  };
}
function buildPairContext(aId,bId){
  if(!historicalMatches) return null;
  const latestDate=historicalMatches.reduce((mx,m)=>m.date>mx?m.date:mx,"1900-01-01");
  const ca=teamHistoryContext(aId,latestDate), cb=teamHistoryContext(bId,latestDate), hh=h2hContext(aId,bId,latestDate);
  return {latestDate,a:ca,b:cb,h2h:hh,
    alphaAdj: clamp((((ca.lowRate+cb.lowRate)/2)-0.52)*-0.18 + (hh.alphaAdj||0), -0.16, 0.12),
    rhoAdj: clamp((((ca.drawRate+cb.drawRate)/2)-0.26)*-0.25, -0.08, 0.08)
  };
}
function contextHtml(ctx,a,b){
  if(!ctx) return "";
  const row=(name,c)=>`<tr><td>${name}</td><td>${c.n}</td><td>${c.gfpg?c.gfpg.toFixed(2):"-"}</td><td>${c.gapg?c.gapg.toFixed(2):"-"}</td><td>${c.ppg?c.ppg.toFixed(2):"-"}</td><td>${pc(c.drawRate||0,1)}</td><td>${pc(c.lowRate||0,1)}</td></tr>`;
  return `<h3>按按钮加载的历史上下文</h3>
    <div class="note">已用完整历史赛果滚动重算 Elo/Attack/Defense，最新样本日期 ${ctx.latestDate}；不使用市场赔率。两队近期修正：${a.c} Elo ${ctx.a.eloAdj.toFixed(1)}，${b.c} Elo ${ctx.b.eloAdj.toFixed(1)}，交锋 ${ctx.h2h.n} 场。</div>
    ${table(["球队","近期场次","GF/场","GA/场","积分/场","平局率","≤2球率"],[row(a.c,ctx.a),row(b.c,ctx.b)].map(x=>x.match(/<td>.*?<\/td>/g).map(y=>y.replace(/<\/?td>/g,""))))}`;
}
function renderPredict(ctx=null){
  if(ctx && (!ctx.a || !ctx.b || !ctx.h2h)) ctx=null;
  const modelSelect=document.getElementById("modelChoice");
  const modelKey=(modelSelect&&PARAMS[modelSelect.value])?modelSelect.value:"dc";
  if(modelSelect&&modelSelect.value!==modelKey) modelSelect.value=modelKey;
  const p=deepParams(PARAMS[modelKey]||PARAMS.dc);
  const state=(modelKey==="dc"||modelKey==="fitted")?(stateFromSnapshot(p)||currentRatings(p)):currentRatings(p);
  let a=cloneTeam(state[document.getElementById("teamA").value]), b=cloneTeam(state[document.getElementById("teamB").value]);
  const out=document.getElementById("result");
  if(!a||!b||a.id===b.id){out.innerHTML='<p class="note">请选择两支不同球队。</p>';return;}
  if(ctx){
    const histState=historicalCurrentRatings(p,ctx.latestDate);
    a=cloneTeam(histState[a.id]||a); b=cloneTeam(histState[b.id]||b);
    a.elo+=ctx.a.eloAdj+(ctx.h2h.eloAdjA||0); b.elo+=ctx.b.eloAdj-(ctx.h2h.eloAdjA||0);
    a.attack+=ctx.a.attackAdj; a.defense+=ctx.a.defenseAdj;
    b.attack+=ctx.b.attackAdj; b.defense+=ctx.b.defenseAdj;
    p.alpha+=ctx.alphaAdj; p.rho=clamp((p.rho||0)+ctx.rhoAdj,-0.18,0.10);
  }
  const r=scoreMatrix(a,b,p,{neutral:true,importance:1});
  const advA=r.advA, advB=1-advA;
  const top=r.cells.slice(0,10).map(s=>`<span class="chip">${a.c} ${s.i}-${s.j} ${b.c} · ${pc(s.pr,1)}</span>`).join("");
  out.innerHTML=`
    <div class="teams">
      <div class="team"><div class="name">${a.c}</div><div class="elo">Elo ${Math.round(a.elo)}</div><div class="adv" style="color:var(--good)">${pc(advA,0)}</div><div class="tag">晋级</div></div>
      <div class="vs">vs</div>
      <div class="team"><div class="name">${b.c}</div><div class="elo">Elo ${Math.round(b.elo)}</div><div class="adv" style="color:var(--red)">${pc(advB,0)}</div><div class="tag">晋级</div></div>
    </div>
    <div class="bar"><div style="width:${pc(r.w)};background:var(--good)"></div><div style="width:${pc(r.d)};background:#b8ad9b"></div><div style="width:${pc(r.l)};background:var(--red)"></div></div>
    <div class="wdl"><span>${a.c}胜 ${pc(r.w,0)}</span><span>平 ${pc(r.d,0)}</span><span>${b.c}胜 ${pc(r.l,0)}</span></div>
    <div class="xg">预期进球 <b>${r.la.toFixed(2)} - ${r.lb.toFixed(2)}</b></div>
    <div class="score-title">最可能比分</div><div class="chips">${top}</div>`;
}
async function renderPredictWithHistory(){
  const out=document.getElementById("result");
  const aId=document.getElementById("teamA").value, bId=document.getElementById("teamB").value;
  renderPredict();
  out.insertAdjacentHTML("afterbegin","<div class='note'>正在加载两队历史战况做上下文校准...</div>");
  try{
    if(!historicalMatches) await loadHistoricalData();
    renderPredict(buildPairContext(aId,bId));
  }catch(e){
    out.insertAdjacentHTML("afterbegin",`<div class="warn">历史战况加载失败，已保留基础预测：${escapeHtml(e.message)}</div>`);
  }
}

function classifyTournament(t){
  const s=String(t||"").toLowerCase();
  if(s==="fifa world cup")return "worldcup";
  if(s.includes("qualification")&&s.includes("fifa world cup"))return "wcq";
  if(s.includes("qualification"))return "qualifier";
  if(s.includes("friendly"))return "friendly";
  if(["uefa euro","copa america","african cup of nations","afc asian cup","concacaf championship","concacaf gold cup","ofc nations cup"].some(x=>s.includes(x)))return "continental";
  if(s.includes("nations league"))return "nations";
  return "other";
}
function importanceOf(cat){
  return {friendly:-0.5,qualifier:0.2,wcq:0.35,continental:0.75,worldcup:1,nations:0.15,other:0}[cat]||0;
}
function parseCsvLine(line){
  const out=[]; let cur="",q=false;
  for(let i=0;i<line.length;i++){
    const ch=line[i];
    if(ch==='"'&&line[i+1]==='"'){cur+='"';i++;continue}
    if(ch==='"'){q=!q;continue}
    if(ch===","&&!q){out.push(cur);cur="";continue}
    cur+=ch;
  }
  out.push(cur); return out;
}
function parseResultsCsv(text){
  const lines=text.trim().split(/\r?\n/), head=parseCsvLine(lines[0]);
  const idx=Object.fromEntries(head.map((h,i)=>[h,i]));
  return lines.slice(1).map(line=>{
    const p=parseCsvLine(line);
    return {date:p[idx.date],home:p[idx.home_team],away:p[idx.away_team],
      hs:+p[idx.home_score],as:+p[idx.away_score],tournament:p[idx.tournament],
      country:p[idx.country],neutral:String(p[idx.neutral]).toUpperCase()==="TRUE"};
  }).filter(m=>m.date&&Number.isFinite(m.hs)&&Number.isFinite(m.as)).sort((a,b)=>a.date.localeCompare(b.date));
}
async function loadHistoricalData(){
  const status=document.getElementById("btStatus");
  if(status) status.textContent="正在从 GitHub raw 加载国家队历史赛果...";
  const res=await fetch(DATA_URL,{cache:"force-cache"});
  if(!res.ok) throw new Error("历史数据加载失败: HTTP "+res.status);
  historicalMatches=parseResultsCsv(await res.text());
  if(status) status.textContent=`已加载 ${historicalMatches.length.toLocaleString()} 场国家队比赛。数据源不含 xG、阵容、伤停。`;
}

function shouldEval(m,start,end,filter){
  if(m.date<start||m.date>end)return false;
  const cat=classifyTournament(m.tournament);
  if(filter==="all")return true;
  return cat===filter || (filter==="qualifier"&&cat==="wcq");
}
function computeMetrics(records){
  const n=records.length;
  const acc={n,logLoss:0,brier:0,scoreNll:0,scoreHit:0,drawPred:0,drawAct:0,p00:0,a00:0,p11:0,a11:0,over15p:0,over15a:0,over25p:0,over25a:0,over35p:0,over35a:0,outside:0};
  const calBins=[[.5,.6],[.6,.7],[.7,.8],[.8,.9],[.9,1.01]].map(b=>({name:`${Math.round(b[0]*100)}-${Math.round(Math.min(b[1],1)*100)}%`,lo:b[0],hi:b[1],n:0,p:0,a:0}));
  const eloBins=[[-9999,50],[50,150],[150,300],[300,500],[500,9999]].map(b=>({name:`${b[0]===-9999?"0":b[0]}-${b[1]===9999?"500+":b[1]}`,lo:b[0],hi:b[1],n:0,ll:0}));
  const byCat={}, byRegion={};
  for(const r of records){
    const y=[r.homeWin?1:0,r.draw?1:0,r.awayWin?1:0], p=[r.pred.w,r.pred.d,r.pred.l];
    const prob=Math.max(EPS,p[y.findIndex(v=>v===1)]);
    acc.logLoss+=-Math.log(prob);
    acc.brier+=(p[0]-y[0])**2+(p[1]-y[1])**2+(p[2]-y[2])**2;
    const exact=r.pred.cells.find(c=>c.i===r.hs&&c.j===r.as);
    if(exact) acc.scoreNll+=-Math.log(Math.max(EPS,exact.pr)); else {acc.scoreNll+=-Math.log(EPS);acc.outside++;}
    if(r.pred.cells[0].i===r.hs&&r.pred.cells[0].j===r.as)acc.scoreHit++;
    acc.drawPred+=r.pred.d; acc.drawAct+=r.draw?1:0;
    acc.p00+=r.pred.p00; acc.a00+=(r.hs===0&&r.as===0)?1:0;
    acc.p11+=r.pred.p11; acc.a11+=(r.hs===1&&r.as===1)?1:0;
    acc.over15p+=r.pred.over15; acc.over15a+=(r.hs+r.as>1.5)?1:0;
    acc.over25p+=r.pred.over25; acc.over25a+=(r.hs+r.as>2.5)?1:0;
    acc.over35p+=r.pred.over35; acc.over35a+=(r.hs+r.as>3.5)?1:0;
    const fav=Math.max(r.pred.w,r.pred.l), favWon=(r.pred.w>=r.pred.l?r.homeWin:r.awayWin)?1:0;
    calBins.forEach(b=>{if(fav>=b.lo&&fav<b.hi){b.n++;b.p+=fav;b.a+=favWon;}});
    const ed=Math.abs(r.eloDiff);
    eloBins.forEach(b=>{if(ed>=b.lo&&ed<b.hi){b.n++;b.ll+=-Math.log(prob);}});
    const cat=r.cat; if(!byCat[cat])byCat[cat]={n:0,ll:0}; byCat[cat].n++; byCat[cat].ll+=-Math.log(prob);
    const reg=r.regionPair; if(!byRegion[reg])byRegion[reg]={n:0,ll:0}; byRegion[reg].n++; byRegion[reg].ll+=-Math.log(prob);
  }
  Object.keys(acc).forEach(k=>{if(k!=="n"&&k!=="outside")acc[k]/=Math.max(1,n)});
  return {summary:acc,calBins,eloBins,byCat,byRegion};
}
function runOneBacktest(modelKey,params,matches,start,end,filter,limit){
  const state={};
  let records=[],tested=0;
  for(const m of matches){
    const cat=classifyTournament(m.tournament);
    const h=resolveName(m.home), a=resolveName(m.away);
    const H=ensureTeam(state,h), A=ensureTeam(state,a);
    const opts={neutral:m.neutral,importance:importanceOf(cat)};
    if(shouldEval(m,start,end,filter)&&tested<limit){
      const pred=scoreMatrix(H,A,params,opts);
      records.push({date:m.date,hs:m.hs,as:m.as,pred,cat,homeWin:m.hs>m.as,draw:m.hs===m.as,awayWin:m.hs<m.as,eloDiff:H.elo-A.elo,
        regionPair:(H.region||"Unknown")+" vs "+(A.region||"Unknown")});
      tested++;
    }
    if(m.date<=end) updateState(state,h,a,m.hs,m.as,params,opts);
  }
  return {model:modelKey,params,records,metrics:computeMetrics(records)};
}
function runBacktestAll(){
  if(!historicalMatches) throw new Error("请先加载历史数据。");
  const start=document.getElementById("btStart").value.trim(), end=document.getElementById("btEnd").value.trim();
  const filter=document.getElementById("btFilter").value, limit=+document.getElementById("btLimit").value||9000;
  const models=["elo","ad","current","fitted","dc"];
  lastReports=models.map(k=>runOneBacktest(k,deepParams(PARAMS[k]),historicalMatches,start,end,filter,limit));
  renderReports();
  document.getElementById("btStatus").textContent=`完成：${start} 至 ${end}，筛选 ${filter}，每模型 ${lastReports[0].records.length.toLocaleString()} 场。`;
}
function fitParams(){
  if(!historicalMatches) throw new Error("请先加载历史数据。");
  const start=document.getElementById("btStart").value.trim(), end=document.getElementById("btEnd").value.trim();
  const filter=document.getElementById("btFilter").value;
  const trainLimit=Math.min(+document.getElementById("btLimit").value||240,240);
  const fitStart = start < "2018-01-01" ? "2018-01-01" : start;
  const fitMatchesAll = historicalMatches.filter(m => m.date >= fitStart && m.date <= end);
  const fitMatches = fitMatchesAll.slice(Math.max(0, fitMatchesAll.length - 1800));
  const alphas=[1.20,1.32].map(Math.log);
  const betaAD=[1/55,1/38];
  const betaElo=[1/1400,1/1000];
  const ks=[18];
  const rhos=[0,-0.08];
  let best={loss:Infinity,p:null,checked:0};
  for(const alpha of alphas)for(const ba of betaAD)for(const be of betaElo)for(const k of ks)for(const rho of rhos){
    const p={...deepParams(PARAMS.current),alpha,betaAD:ba,betaElo:be,k,adK:ba===0?0:0.25,minLambda:0.08,maxLambda:3.9,rho,scoreMax:8,penEloScale:520,penRatingScale:12};
    const rep=runOneBacktest("fit",p,fitMatches,fitStart,end,filter,trainLimit);
    const loss=rep.metrics.summary.logLoss+0.35*rep.metrics.summary.scoreNll;
    best.checked++;
    if(loss<best.loss)best={loss,p,checked:best.checked,rep};
  }
  PARAMS.fitted={...best.p,rho:0,name:"轻量拟合普通 Poisson"};
  PARAMS.dc={...best.p,name:"轻量拟合 Dixon-Coles"};
  localStorage.setItem("wc_model_params",JSON.stringify({fitted:PARAMS.fitted,dc:PARAMS.dc}));
  document.getElementById("btStatus").textContent=`快速参数试探完成：窗口 ${fitStart} 至 ${end}，最多 ${trainLimit} 场，检查 ${best.checked} 组参数。最优 alpha=${best.p.alpha.toFixed(4)}, betaAD=${best.p.betaAD.toFixed(5)}, betaElo=${best.p.betaElo.toFixed(5)}, K=${best.p.k}, rho=${best.p.rho}。如需严肃结论，请用脚本离线跑更大网格。`;
  renderParams();
  renderPredict();
}

function table(headers,rows){
  return `<table><tr>${headers.map(h=>`<th>${h}</th>`).join("")}</tr>${rows.map(r=>`<tr>${r.map(c=>`<td>${c}</td>`).join("")}</tr>`).join("")}</table>`;
}
function renderReports(){
  if(!lastReports)return;
  const rows=lastReports.map(r=>{
    const m=r.metrics.summary;
    return [PARAMS[r.model].name,r.records.length,m.logLoss.toFixed(4),m.brier.toFixed(4),m.scoreNll.toFixed(4),pc(m.scoreHit,2),pc(m.drawPred,1),pc(m.drawAct,1),pc(m.p00,2),pc(m.a00,2),pc(m.p11,2),pc(m.a11,2),m.outside];
  });
  document.getElementById("metricsOut").innerHTML=table(["模型","场次","1X2 Log Loss","Brier","Score NLL","最高比分命中","预测平局","真实平局","预测0-0","真实0-0","预测1-1","真实1-1","越界比分"],rows);
  const dc=lastReports.find(r=>r.model==="dc")||lastReports[0];
  document.getElementById("calibrationOut").innerHTML=table(["预测热门胜率分桶","场次","平均预测","真实热门胜率","误差"],dc.metrics.calBins.map(b=>[b.name,b.n,b.n?pc(b.p/b.n,1):"-",b.n?pc(b.a/b.n,1):"-",b.n?pc((b.p-b.a)/b.n,1):"-"]));
  const catRows=Object.entries(dc.metrics.byCat).sort((a,b)=>b[1].n-a[1].n).map(([k,v])=>[k,v.n,(v.ll/v.n).toFixed(4)]);
  const eloRows=dc.metrics.eloBins.map(b=>[b.name,b.n,b.n?(b.ll/b.n).toFixed(4):"-"]);
  const regRows=Object.entries(dc.metrics.byRegion).filter(x=>x[1].n>=20).sort((a,b)=>b[1].n-a[1].n).slice(0,10).map(([k,v])=>[k,v.n,(v.ll/v.n).toFixed(4)]);
  document.getElementById("sliceOut").innerHTML=
    "<div class='twocol'><div>"+table(["赛事类型","场次","Log Loss"],catRows)+"</div><div>"+table(["Elo差区间","场次","Log Loss"],eloRows)+"</div></div><h3>已知大洲/区域对阵 Top10</h3>"+table(["区域组合","场次","Log Loss"],regRows);
}
function renderAudit(){
  if(!document.getElementById("auditKv")||!document.getElementById("fieldTable")) return;
  const kv=[
    ["进入预测", "Elo、Attack、Defense、Penalty、已录入赛果、模型参数"],
    ["仅展示", "中文队名、区域标签、数据来源说明、部分 UI 文案"],
    ["当前预期进球", "log(lambda)=alpha + betaAD*(AttackA-DefenseB)+betaElo*(EloA-EloB)+可选赛地/重要性项"],
    ["当前比分矩阵", "0-8 独立 Poisson；Dixon-Coles 版本对 0-0/1-0/0-1/1-1 加 tau 修正并归一化"],
    ["Elo 更新", "K*(actual-expected)，零和更新双方"],
    ["Attack/Defense 更新", "按赛后进球残差更新：进攻超预期提升本队 Attack，防守方 Defense 下降；反之亦然"],
    ["Penalty", "logistic((Elo差/penEloScale)+(Penalty差/penRatingScale))"],
    ["是否拟合", "原始 current 参数未历史拟合；fitted/dc 参数可由本页 rolling backtest 粗网格拟合"]
  ];
  document.getElementById("auditKv").innerHTML=kv.map(x=>`<div>${x[0]}</div><div>${x[1]}</div>`).join("");
  document.getElementById("fieldTable").innerHTML=table(["字段","是否入模","说明"],[
    ["Elo","是","实力主轴；需用回测判断是否与 Attack/Defense 重复放大强队"],
    ["Attack/Defense","是","攻防拆分；如果其构造已含 Elo/FIFA/身价，则与 Elo 存在共线风险"],
    ["Power Score","否","当前页面未直接使用；原工作簿中可能用于生成 Attack/Defense"],
    ["FIFA Rank","否","不直接入模"],
    ["身价","否","页面当前不直接入模；阵容层第二轮再加"],
    ["xG/xGA","否","当前无可靠覆盖，不能伪造"],
    ["市场赔率/Polymarket","否","明确禁止作为输入"]
  ]);
}
function renderParams(){
  if(!document.getElementById("paramsOut")) return;
  const rows=Object.entries(PARAMS).map(([k,p])=>[p.name,k,Math.exp(p.alpha).toFixed(3),p.betaAD.toFixed(6),p.betaElo.toFixed(6),p.k,p.adK,p.minLambda,p.maxLambda,p.scoreMax,p.rho,p.penEloScale,p.penRatingScale]);
  document.getElementById("paramsOut").innerHTML=table(["模型","key","base_goal_rate","betaAD","betaElo","Elo K","AD K","xG下限","xG上限","比分截断","DC rho","点球Elo尺度","点球评级尺度"],rows);
}
function init(){
  try{localStorage.removeItem("wc_model_params");}catch{}
  const R=stateFromSnapshot(PARAMS.dc)||currentRatings(PARAMS.dc);
  const list=Object.values(R).sort((a,b)=>b.elo-a.elo);
  const A=document.getElementById("teamA"), B=document.getElementById("teamB");
  list.forEach(x=>{
    const o=document.createElement("option");o.value=x.id;o.textContent=`${x.c} · Elo ${Math.round(x.elo)}`;A.appendChild(o);
    B.appendChild(o.cloneNode(true));
  });
  A.value="Spain";B.value="France";document.getElementById("modelChoice").value="dc";
  renderPredict();
  document.getElementById("go").onclick=()=>renderPredict();
  A.onchange=()=>renderPredict();
  B.onchange=()=>renderPredict();
  document.getElementById("modelChoice").onchange=()=>renderPredict();
  const dates=RESULTS.map(m=>m.date).sort();
  const postSnapshot=RESULTS.filter(m=>m.date>MODEL_SNAPSHOT.latestDate);
  const latestPost=postSnapshot.map(m=>m.date).sort().at(-1)||"-";
  document.getElementById("foot").innerHTML=`数据截至 ${latestPost} · 已录入 ${RESULTS.length} 场结果 · 版本 ${APP_VERSION}`;
}
init();
